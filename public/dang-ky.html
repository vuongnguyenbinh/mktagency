<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Đăng ký CTV — EcoSmart</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-50 to-blue-50">
  <header class="px-6 py-4 bg-white shadow-sm">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <a href="/" class="flex items-center gap-2">
        <div class="w-8 h-8 rounded bg-emerald-600 text-white grid place-items-center font-bold">E</div>
        <span class="font-semibold text-gray-800">EcoSmart · Đăng ký CTV</span>
      </a>
      <a href="/" class="text-sm text-gray-500 hover:text-gray-800">← Trang chủ</a>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm p-6 sm:p-8">
      <h1 class="text-2xl font-bold text-gray-900 mb-2">Đăng ký Cộng tác viên</h1>
      <p class="text-gray-600 mb-6">Vui lòng điền đầy đủ thông tin. Các trường có dấu <span class="text-red-500">*</span> là bắt buộc.</p>

      <form id="ctv-form" class="space-y-4">
        <!-- Honeypot -->
        <input type="text" name="_hp" tabindex="-1" autocomplete="off"
               style="position:absolute;left:-9999px;opacity:0;height:0;width:0" />

        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên <span class="text-red-500">*</span></label>
            <input name="ho_ten" required maxlength="255"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại <span class="text-red-500">*</span></label>
            <input name="sdt" required maxlength="20" inputmode="tel"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none" />
          </div>
        </div>

        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input name="email" type="email" maxlength="255"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">CCCD/CMND</label>
            <input name="cccd" maxlength="20"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Địa chỉ</label>
          <input name="dia_chi" maxlength="500"
                 class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none" />
        </div>

        <fieldset class="border-t pt-4">
          <legend class="text-sm font-semibold text-gray-700 px-2">Thông tin ngân hàng (để chi trả hoa hồng)</legend>
          <div class="grid sm:grid-cols-3 gap-4 mt-2">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Ngân hàng</label>
              <input name="ngan_hang" maxlength="100"
                     class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Số tài khoản</label>
              <input name="so_tk" maxlength="50" inputmode="numeric"
                     class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Chủ tài khoản</label>
              <input name="chu_tk" maxlength="255"
                     class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none" />
            </div>
          </div>
        </fieldset>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú</label>
          <textarea name="ghi_chu" rows="3"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none"></textarea>
        </div>

        <button type="submit" id="submit-btn"
                class="w-full bg-emerald-600 hover:bg-emerald-700 disabled:bg-gray-400 text-white font-semibold rounded-lg py-3 transition">
          Gửi đăng ký
        </button>
      </form>
    </div>
  </main>

  <!-- Toast container -->
  <div id="toast" class="fixed top-4 right-4 z-50"></div>

  <script>
    const form = document.getElementById('ctv-form');
    const submitBtn = document.getElementById('submit-btn');
    const toastEl = document.getElementById('toast');

    function showToast(msg, type) {
      const colors = { success: 'bg-emerald-600', error: 'bg-red-600' };
      const div = document.createElement('div');
      div.className = `${colors[type] || 'bg-gray-700'} text-white px-4 py-3 rounded-lg shadow-lg mb-2 max-w-sm animate-pulse`;
      div.style.animation = 'none';
      div.textContent = msg;
      toastEl.appendChild(div);
      setTimeout(() => div.remove(), 5000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Đang gửi…';

      const data = Object.fromEntries(new FormData(form));
      try {
        const res = await fetch('/api/public/register-ctv', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const json = await res.json();
        if (json.success) {
          showToast(`Đăng ký thành công! Mã CTV: ${json.data.ma_ctv}`, 'success');
          form.reset();
        } else {
          showToast(json.message || 'Có lỗi xảy ra', 'error');
        }
      } catch (err) {
        showToast('Không kết nối được máy chủ', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Gửi đăng ký';
      }
    });
  </script>
</body>
</html>
