<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Bảng hàng — EcoSmart CTV</title>
  <link rel="icon" type="image/png" href="/logo-ecosmart.png?v=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Phudu:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { heading: ['Phudu','Inter','sans-serif'], body: ['Inter','sans-serif'] },
          colors: { gold: { DEFAULT: '#c8a164', light: '#d4b87a', dark: '#b08d45', deep: '#7a5c25' } },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1,h2,h3,h4,h5,h6 { font-family: 'Phudu', sans-serif; }
    @keyframes pulse-slow { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.92; transform: scale(1.03); } }
    .animate-pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
  </style>
</head>
<body class="min-h-screen bg-stone-50">
  <header class="px-6 py-4 bg-white shadow-sm">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <a href="/" class="flex items-center gap-3">
        <img src="/logo-ecosmart.png?v=1" alt="EcoSmart" class="w-10 h-10 object-contain" />
        <span class="font-heading font-bold text-gold-dark">EcoSmart · Bảng hàng</span>
      </a>
      <button id="logout-btn" class="hidden text-sm text-stone-500 hover:text-red-600">Đăng xuất</button>
    </div>
  </header>

  <!-- Password screen -->
  <section id="pwd-screen" class="max-w-md mx-auto px-4 py-16">
    <div class="bg-white rounded-xl shadow-sm p-8">
      <img src="/logo-ecosmart.png?v=1" alt="EcoSmart" class="w-16 h-16 mx-auto object-contain mb-3" />
      <h1 class="font-heading text-2xl font-bold text-center text-stone-900 mb-2">Bảng hàng nội bộ</h1>
      <p class="text-stone-600 text-center mb-6">Vui lòng nhập mật khẩu để truy cập danh sách sản phẩm.</p>
      <form id="pwd-form" class="space-y-4">
        <input id="pwd-input" type="password" required placeholder="Mật khẩu"
               class="w-full border border-stone-300 rounded-lg px-3 py-3 focus:ring-2 focus:ring-gold focus:border-gold outline-none" />
        <div id="pwd-error" class="hidden text-red-600 text-sm"></div>
        <button type="submit" id="pwd-btn"
                class="w-full bg-gold hover:bg-gold-dark disabled:bg-stone-400 text-white font-heading font-semibold rounded-lg py-3 transition">
          Vào bảng hàng
        </button>
      </form>
    </div>
  </section>

  <!-- Catalog screen -->
  <section id="catalog-screen" class="hidden max-w-7xl mx-auto px-4 py-6">
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6 space-y-3">
      <input id="search-input" type="search" placeholder="🔍 Tìm theo tên, địa chỉ, tòa nhà, mô tả…"
             class="w-full border border-stone-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-gold focus:border-gold outline-none" />
      <div class="grid sm:grid-cols-3 gap-3">
        <div>
          <label class="block text-xs font-semibold text-stone-600 mb-1 uppercase tracking-wide">Khu vực / Tòa nhà</label>
          <select id="filter-area" class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-gold focus:border-gold outline-none bg-white">
            <option value="">Tất cả khu vực</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-stone-600 mb-1 uppercase tracking-wide">Giá thuê</label>
          <select id="filter-price" class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-gold focus:border-gold outline-none bg-white">
            <option value="">Tất cả mức giá</option>
            <option value="0-20000000">Dưới 20 triệu</option>
            <option value="20000000-50000000">20 — 50 triệu</option>
            <option value="50000000-100000000">50 — 100 triệu</option>
            <option value="100000000-500000000">100 — 500 triệu</option>
            <option value="500000000-9999999999">Trên 500 triệu</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-stone-600 mb-1 uppercase tracking-wide">Tình trạng</label>
          <select id="filter-status" class="w-full border border-stone-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-gold focus:border-gold outline-none bg-white">
            <option value="">Tất cả trạng thái</option>
            <option value="Trống">🔥 Cho thuê (còn trống)</option>
            <option value="Giữ chỗ">Giữ cọc</option>
            <option value="Đang thuê">Đang thuê</option>
          </select>
        </div>
      </div>
      <div class="flex items-center justify-between flex-wrap gap-2 pt-2 border-t border-stone-100">
        <div id="result-count" class="text-sm text-stone-500"></div>
        <button type="button" id="reset-filters" class="text-sm text-gold-dark hover:text-gold-deep underline">Xóa bộ lọc</button>
      </div>
    </div>
    <div id="grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5"></div>
    <div id="empty-state" class="hidden text-center text-stone-500 py-16">Không có sản phẩm phù hợp.</div>
  </section>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden fixed inset-0 bg-black/85 z-50 items-center justify-center p-4" onclick="closeLightbox()">
    <button type="button" onclick="event.stopPropagation();prevImg()" class="absolute left-4 top-1/2 -translate-y-1/2 text-white text-3xl bg-black/40 hover:bg-black/60 w-12 h-12 rounded-full">‹</button>
    <button type="button" onclick="event.stopPropagation();nextImg()" class="absolute right-4 top-1/2 -translate-y-1/2 text-white text-3xl bg-black/40 hover:bg-black/60 w-12 h-12 rounded-full">›</button>
    <button type="button" onclick="closeLightbox()" class="absolute top-4 right-4 text-white text-2xl bg-black/40 hover:bg-black/60 w-10 h-10 rounded-full">×</button>
    <img id="lightbox-img" class="max-h-[90vh] max-w-[90vw] object-contain rounded-lg" onclick="event.stopPropagation()" />
    <div id="lightbox-counter" class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white bg-black/50 px-3 py-1 rounded-full text-sm"></div>
  </div>

  <script>
    const pwdScreen = document.getElementById('pwd-screen');
    const catalogScreen = document.getElementById('catalog-screen');
    const pwdForm = document.getElementById('pwd-form');
    const pwdInput = document.getElementById('pwd-input');
    const pwdBtn = document.getElementById('pwd-btn');
    const pwdError = document.getElementById('pwd-error');
    const logoutBtn = document.getElementById('logout-btn');
    const searchInput = document.getElementById('search-input');
    const grid = document.getElementById('grid');
    const emptyState = document.getElementById('empty-state');
    const resultCount = document.getElementById('result-count');

    const TOKEN_KEY = 'publicToken';
    const fmtVND = new Intl.NumberFormat('vi-VN');
    let allProducts = [];
    let currentToken = null;

    const filterArea = document.getElementById('filter-area');
    const filterPrice = document.getElementById('filter-price');
    const filterStatus = document.getElementById('filter-status');
    const resetBtn = document.getElementById('reset-filters');
    const lightboxEl = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCounter = document.getElementById('lightbox-counter');
    let lightboxImages = [];
    let lightboxIdx = 0;

    function showPwd() {
      pwdScreen.classList.remove('hidden');
      catalogScreen.classList.add('hidden');
      logoutBtn.classList.add('hidden');
      pwdInput.value = '';
      pwdInput.focus();
    }
    function showCatalog() {
      pwdScreen.classList.add('hidden');
      catalogScreen.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');
    }
    function showError(msg) {
      pwdError.textContent = msg;
      pwdError.classList.remove('hidden');
    }

    pwdForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      pwdBtn.disabled = true;
      pwdBtn.textContent = 'Đang xác minh…';
      pwdError.classList.add('hidden');
      try {
        const res = await fetch('/api/public/verify-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwdInput.value }),
        });
        const json = await res.json();
        if (json.success) {
          localStorage.setItem(TOKEN_KEY, json.data.token);
          await loadProducts(json.data.token);
        } else {
          showError(json.message || 'Sai mật khẩu');
        }
      } catch {
        showError('Không kết nối được máy chủ');
      } finally {
        pwdBtn.disabled = false;
        pwdBtn.textContent = 'Vào bảng hàng';
      }
    });

    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem(TOKEN_KEY);
      allProducts = [];
      currentToken = null;
      showPwd();
    });

    async function loadProducts(token) {
      currentToken = token;
      try {
        const res = await fetch('/api/public/products', {
          headers: { Authorization: 'Bearer ' + token },
        });
        if (res.status === 401) {
          localStorage.removeItem(TOKEN_KEY);
          showPwd();
          return;
        }
        const json = await res.json();
        if (!json.success) {
          showError(json.message || 'Lỗi tải dữ liệu');
          return;
        }
        allProducts = json.data;
        populateAreaOptions(allProducts);
        showCatalog();
        applyFilters();
      } catch {
        showError('Không kết nối được máy chủ');
      }
    }

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function truncate(s, n) {
      s = s || '';
      return s.length > n ? s.slice(0, n) + '…' : s;
    }

    function imgUrl(maDd, filename) {
      return `/api/public/products/${maDd}/images/${encodeURIComponent(filename)}?token=${encodeURIComponent(currentToken)}`;
    }

    function statusStyle(s) {
      // "Trống" (available for rent) — RED + prominent for sales focus
      if (s === 'Trống') return {
        cls: 'bg-red-600 text-white shadow-lg ring-2 ring-red-300 ring-offset-1 animate-pulse-slow',
        label: '🔥 CHO THUÊ',
        big: true,
      };
      if (s === 'Đang thuê') return { cls: 'bg-stone-500 text-white shadow', label: '● ĐANG THUÊ' };
      if (s === 'Giữ chỗ') return { cls: 'bg-amber-500 text-white shadow', label: '◐ GIỮ CỌC' };
      return { cls: 'bg-stone-300 text-stone-700', label: s || '—' };
    }

    function renderGrid(items) {
      resultCount.textContent = `${items.length} / ${allProducts.length} sản phẩm`;
      if (items.length === 0) {
        grid.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }
      emptyState.classList.add('hidden');
      grid.innerHTML = items.map((item) => {
        const title = item.ten_hien_thi || `${item.toa_nha} - T${item.tang || '?'} - P${item.phong || '?'}`;
        const dienTich = item.dien_tich ? `${parseFloat(item.dien_tich).toLocaleString('vi-VN')} m²` : '—';
        const giaThue = item.gia_thue ? `${fmtVND.format(item.gia_thue)} đ/tháng` : 'Liên hệ';
        const phiDV = item.phi_dich_vu ? `Phí DV: ${fmtVND.format(item.phi_dich_vu)} đ` : '';
        const imgs = item.images || [];
        const imgCount = imgs.length;
        const st = statusStyle(item.trang_thai);
        const tienIchList = (item.tien_ich || '').split(/[,\n]/).map((s) => s.trim()).filter(Boolean);

        // Image area: main image + thumbnail strip (if 2+) or empty placeholder
        const mainImg = imgCount > 0
          ? `<img src="${imgUrl(item.ma_dd, imgs[0])}" alt="${escapeHtml(title)}" loading="lazy"
                  class="w-full h-full object-cover transition duration-500 hover:scale-105" />`
          : `<div class="w-full h-full grid place-items-center bg-gradient-to-br from-stone-100 to-amber-50 text-stone-300 text-6xl">🏢</div>`;

        const thumbStrip = imgCount > 1
          ? `<div class="flex gap-1 p-1 bg-stone-50 overflow-x-auto">
              ${imgs.slice(0, 5).map((f, i) => `
                <img src="${imgUrl(item.ma_dd, f)}" alt="thumb" loading="lazy"
                     onclick="event.stopPropagation();openLightbox('${item.ma_dd}',${i})"
                     class="w-14 h-14 object-cover rounded cursor-pointer hover:ring-2 hover:ring-gold flex-shrink-0" />
              `).join('')}
              ${imgCount > 5 ? `<div onclick="event.stopPropagation();openLightbox('${item.ma_dd}',5)" class="w-14 h-14 grid place-items-center bg-stone-200 rounded cursor-pointer text-stone-600 text-xs font-bold flex-shrink-0">+${imgCount - 5}</div>` : ''}
            </div>`
          : '';

        return `
          <div class="bg-white rounded-xl shadow-sm overflow-hidden hover:shadow-xl transition border border-stone-100 group">
            <div class="relative h-56 bg-stone-100 cursor-pointer overflow-hidden" ${imgCount ? `onclick="openLightbox('${item.ma_dd}',0)"` : ''}>
              ${mainImg}
              <span class="absolute top-3 left-3 ${st.cls} ${st.big ? 'text-sm px-4 py-2' : 'text-xs px-3 py-1.5'} font-bold rounded-full tracking-wider uppercase">${st.label}</span>
              ${imgCount > 0 ? `<span class="absolute bottom-3 right-3 bg-black/70 text-white text-xs px-2.5 py-1 rounded-full backdrop-blur-sm">📷 ${imgCount}</span>` : ''}
              <div class="absolute inset-x-0 bottom-0 h-16 bg-gradient-to-t from-black/40 to-transparent pointer-events-none"></div>
            </div>
            ${thumbStrip}
            <div class="p-4">
              <h3 class="font-heading font-semibold text-stone-900 mb-1 text-lg">${escapeHtml(title)}</h3>
              <p class="text-sm text-stone-500 mb-3 flex items-center gap-1">📍 ${escapeHtml(item.dia_chi || item.toa_nha || '')}</p>
              <div class="flex flex-wrap items-baseline gap-x-3 gap-y-1 mb-2">
                <span class="text-gold-deep font-heading font-bold text-lg">${giaThue}</span>
                <span class="bg-stone-100 text-stone-700 text-xs px-2 py-0.5 rounded">${dienTich}</span>
              </div>
              ${phiDV ? `<p class="text-xs text-stone-500 mb-2">${phiDV}</p>` : ''}
              ${item.mo_ta ? `<p class="text-sm text-stone-600 mb-2">${escapeHtml(truncate(item.mo_ta, 120))}</p>` : ''}
              ${tienIchList.length
                ? `<div class="flex flex-wrap gap-1 mt-2">${tienIchList.slice(0, 5).map((t) => `<span class="text-xs bg-gold/10 text-gold-deep px-2 py-0.5 rounded">${escapeHtml(t)}</span>`).join('')}</div>`
                : ''}
            </div>
          </div>`;
      }).join('');
    }

    function populateAreaOptions(items) {
      const areas = Array.from(new Set(items.map((p) => p.toa_nha).filter(Boolean))).sort();
      filterArea.innerHTML = '<option value="">Tất cả khu vực</option>' +
        areas.map((a) => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join('');
    }

    function applyFilters() {
      const q = searchInput.value.toLowerCase().trim();
      const area = filterArea.value;
      const priceRange = filterPrice.value;
      const status = filterStatus.value;

      let [minP, maxP] = [0, Infinity];
      if (priceRange) {
        const parts = priceRange.split('-').map(Number);
        minP = parts[0]; maxP = parts[1];
      }

      const filtered = allProducts.filter((p) => {
        if (q && ![p.ten_hien_thi, p.dia_chi, p.toa_nha, p.mo_ta].filter(Boolean).some((s) => String(s).toLowerCase().includes(q))) return false;
        if (area && p.toa_nha !== area) return false;
        if (status && p.trang_thai !== status) return false;
        if (priceRange) {
          const g = parseFloat(p.gia_thue) || 0;
          if (g < minP || g > maxP) return false;
        }
        return true;
      });
      renderGrid(filtered);
    }

    [searchInput, filterArea, filterPrice, filterStatus].forEach((el) => el.addEventListener('input', applyFilters));
    [filterArea, filterPrice, filterStatus].forEach((el) => el.addEventListener('change', applyFilters));
    resetBtn.addEventListener('click', () => {
      searchInput.value = ''; filterArea.value = ''; filterPrice.value = ''; filterStatus.value = '';
      applyFilters();
    });

    // Lightbox
    function openLightbox(maDd, startIdx) {
      const item = allProducts.find((p) => p.ma_dd === maDd);
      if (!item || !item.images || item.images.length === 0) return;
      lightboxImages = item.images.map((f) => imgUrl(maDd, f));
      lightboxIdx = startIdx || 0;
      lightboxImg.src = lightboxImages[lightboxIdx];
      lightboxCounter.textContent = `${lightboxIdx + 1} / ${lightboxImages.length}`;
      lightboxEl.classList.remove('hidden');
      lightboxEl.classList.add('flex');
    }
    function closeLightbox() {
      lightboxEl.classList.add('hidden');
      lightboxEl.classList.remove('flex');
    }
    function prevImg() {
      lightboxIdx = (lightboxIdx - 1 + lightboxImages.length) % lightboxImages.length;
      lightboxImg.src = lightboxImages[lightboxIdx];
      lightboxCounter.textContent = `${lightboxIdx + 1} / ${lightboxImages.length}`;
    }
    function nextImg() {
      lightboxIdx = (lightboxIdx + 1) % lightboxImages.length;
      lightboxImg.src = lightboxImages[lightboxIdx];
      lightboxCounter.textContent = `${lightboxIdx + 1} / ${lightboxImages.length}`;
    }
    document.addEventListener('keydown', (e) => {
      if (lightboxEl.classList.contains('hidden')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevImg();
      if (e.key === 'ArrowRight') nextImg();
    });

    // Init
    const savedToken = localStorage.getItem(TOKEN_KEY);
    if (savedToken) loadProducts(savedToken);
    else showPwd();
  </script>
</body>
</html>
