<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Cổng CTV — EcoSmart</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-50 to-blue-50 flex flex-col">
  <header class="px-6 py-4">
    <div class="max-w-5xl mx-auto flex items-center gap-2">
      <div class="w-8 h-8 rounded bg-emerald-600 text-white grid place-items-center font-bold">E</div>
      <span class="font-semibold text-gray-800">EcoSmart</span>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-6">
    <div class="max-w-2xl w-full text-center">
      <h1 class="text-4xl sm:text-5xl font-bold text-gray-900 mb-4">Cổng cộng tác viên</h1>
      <p class="text-gray-600 text-lg mb-10">
        Đăng ký để trở thành cộng tác viên kinh doanh văn phòng cho thuê EcoSmart, hoặc xem danh sách sản phẩm hiện có.
      </p>

      <div class="grid sm:grid-cols-2 gap-4">
        <a href="/dang-ky"
           class="block bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-xl px-6 py-5 shadow-md transition">
          <div class="text-2xl mb-1">📝</div>
          <div>Đăng ký CTV</div>
          <div class="text-emerald-100 text-sm font-normal mt-1">Điền thông tin cá nhân</div>
        </a>
        <a href="/bang-hang"
           class="block bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl px-6 py-5 shadow-md transition">
          <div class="text-2xl mb-1">🏢</div>
          <div>Xem bảng hàng</div>
          <div class="text-blue-100 text-sm font-normal mt-1">Danh sách sản phẩm đang bán</div>
        </a>
      </div>
    </div>
  </main>

  <footer class="px-6 py-4 text-center text-sm text-gray-500">
    © EcoSmart Group · sale.ecosmartgroup.vn
  </footer>
</body>
</html>
